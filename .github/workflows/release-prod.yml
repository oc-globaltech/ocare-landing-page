name: Release Production

# Manual deploy to Cloudflare Pages "production" branch (default).
# Tag scheme: vX.Y.Z (no -dev).

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Staging dev tag to deploy (e.g. v0.3.0-dev). Blank = latest -dev tag.'
        required: false
        type: string
      target_version:
        description: 'Override target prod version. Blank = strip -dev from source_tag.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-prod-${{ github.repository }}
  cancel-in-progress: false

env:
  SERVICE_NAME: landing-page

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::must run from main"; exit 1
          fi

  release:
    runs-on: ubuntu-latest
    needs: guard
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve target + source
        id: r
        run: |
          set -euo pipefail
          INPUT_TARGET="${{ inputs.target_version }}"
          INPUT_SOURCE="${{ inputs.source_tag }}"

          if [[ -z "$INPUT_SOURCE" ]]; then
            INPUT_SOURCE="$(git tag --list 'v*.*.*-dev' --sort=-v:refname | head -n1)"
            [[ -n "$INPUT_SOURCE" ]] || { echo "::error::no -dev tag found"; exit 1; }
          fi

          git rev-parse "$INPUT_SOURCE" >/dev/null 2>&1 \
            || { echo "::error::source tag $INPUT_SOURCE not found"; exit 1; }

          TARGET="${INPUT_TARGET:-${INPUT_SOURCE%-dev}}"

          [[ "$TARGET" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "::error::invalid target format: $TARGET"; exit 1; }

          if git rev-parse "$TARGET" >/dev/null 2>&1; then
            echo "::error::$TARGET already exists"; exit 1
          fi

          SHA="$(git rev-list -n 1 "$INPUT_SOURCE")"

          echo "version=${TARGET}"      >> "$GITHUB_OUTPUT"
          echo "source=${INPUT_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SHA}"      >> "$GITHUB_OUTPUT"

      - name: Checkout source commit (re-deploy exact bytes from staging)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.r.outputs.source_sha }}
          fetch-depth: 1
          path: source

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: source/package-lock.json

      - run: npm ci
        working-directory: source

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: source
        run: |
          npx wrangler pages deploy . \
            --project-name ocare-landing \
            --branch main \
            --commit-hash "${{ steps.r.outputs.source_sha }}" \
            --commit-message "${{ steps.r.outputs.version }}"

      - name: Tag git + Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "ocare-ci-bot"
          git config user.email "ci@ocgt.app"
          git tag -a "${{ steps.r.outputs.version }}" \
            -m "Production release ${{ steps.r.outputs.version }}

            Promoted from: ${{ steps.r.outputs.source }} (${{ steps.r.outputs.source_sha }})"
          git push origin "${{ steps.r.outputs.version }}"

          gh release create "${{ steps.r.outputs.version }}" \
            --title "${{ env.SERVICE_NAME }} ${{ steps.r.outputs.version }}" \
            --generate-notes \
            --target main
